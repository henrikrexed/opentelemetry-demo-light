receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  memory_limiter:
    check_interval: 1s
    limit_mib: 80
    spike_limit_mib: 20

  resource:
    attributes:
      - key: service.namespace
        value: opentelemetry-demo-light
        action: upsert
      - key: deployment.environment
        value: development
        action: upsert

exporters:
  debug:
    verbosity: basic

  # Uncomment and configure to send telemetry to an OTLP-compatible backend:
  # otlp:
  #   endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT_BACKEND}
  #   headers:
  #     Authorization: ${OTEL_EXPORTER_OTLP_HEADERS}
  #   tls:
  #     insecure: true

  # Uncomment to send to Jaeger (when using --profile jaeger):
  # otlp/jaeger:
  #   endpoint: jaeger:4317
  #   tls:
  #     insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
