    ('1YMWWN1N4O','Eclipsmart Travel Refractor Telescope','Portable telescope with built-in solar filter.','/images/EclipsmartTravelRefractorTelescope.jpg',12999,ARRAY['telescopes','travel']),
    ('L9ECAV7KIM','Lens Cleaning Kit','Cleaning kit for telescopes and binoculars.','/images/LensCleaningKit.jpg',3999,ARRAY['accessories']),
    ('2ZYFJ3GM2N','Roof Binoculars','10x42 roof prism binoculars.','/images/RoofBinoculars.jpg',20999,ARRAY['binoculars']),
    ('0PUK6V6EV0','Solar System Color Imager','High-speed planetary camera.','/images/SolarSystemColorImager.jpg',17499,ARRAY['accessories','cameras']),
