## OpenTelemetry Demo Light — Helm Values
## See docs/getting-started/helm-values.md for full reference.

collector:
  enabled: true
  image: otel/opentelemetry-collector-contrib:0.147.0
  replicas: 1
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 64Mi

# When collector.enabled=false, services send OTLP directly here
otlp:
  endpoint: "http://otel-collector:4317"
  protocol: grpc  # grpc or http

metrics:
  aggregation: cumulative  # cumulative or delta

gateway:
  enabled: false
  provider: ""       # istio, cilium, envoy, nginx
  hostname: ""       # e.g. demo.example.com
  className: ""      # override GatewayClass name (default: derived from provider)
  tls:
    enabled: false
    secretName: ""

# Infrastructure
postgres:
  image: postgres:16-alpine
  replicas: 1
  user: otel
  password: otel
  resources:
    limits:
      memory: 80Mi
    requests:
      memory: 40Mi

valkey:
  image: valkey/valkey:7-alpine
  replicas: 1
  resources:
    limits:
      memory: 20Mi
    requests:
      memory: 10Mi

# Per-service configuration
images:
  frontend:
    repository: ghcr.io/henrikrexed/opentelemetry-demo-light/frontend
    tag: "0.0.7"
    pullPolicy: IfNotPresent
  productCatalog:
    repository: ghcr.io/henrikrexed/opentelemetry-demo-light/product-catalog
    tag: "0.0.7"
    pullPolicy: IfNotPresent
  cart:
    repository: ghcr.io/henrikrexed/opentelemetry-demo-light/cart
    tag: "0.0.7"
    pullPolicy: IfNotPresent
  checkout:
    repository: ghcr.io/henrikrexed/opentelemetry-demo-light/checkout
    tag: "0.0.7"
    pullPolicy: IfNotPresent
  payment:
    repository: ghcr.io/henrikrexed/opentelemetry-demo-light/payment
    tag: "0.0.7"
    pullPolicy: IfNotPresent
  loadGenerator:
    repository: ghcr.io/henrikrexed/opentelemetry-demo-light/load-generator
    tag: "0.0.7"
    pullPolicy: IfNotPresent

frontend:
  replicas: 1
  port: 8080
  resources:
    limits:
      memory: 250Mi
    requests:
      memory: 128Mi

productCatalog:
  replicas: 1
  port: 3550
  resources:
    limits:
      memory: 20Mi
    requests:
      memory: 10Mi

cart:
  replicas: 1
  port: 7070
  jvmOpts: "-Xmx128m"
  resources:
    limits:
      memory: 200Mi
    requests:
      memory: 100Mi

checkout:
  replicas: 1
  port: 5050
  resources:
    limits:
      memory: 50Mi
    requests:
      memory: 25Mi

payment:
  replicas: 1
  port: 6060
  resources:
    limits:
      memory: 10Mi
    requests:
      memory: 5Mi

loadGenerator:
  enabled: true
  replicas: 1
  vus: 5
  duration: "87600h"  # ~10 years, effectively forever
  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
