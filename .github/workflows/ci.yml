name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  product-catalog:
    name: Product Catalog (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/product-catalog
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate protobuf
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          sudo apt-get install -y protobuf-compiler
          mkdir -p genproto/oteldemo
          protoc --proto_path=../../proto \
            --go_out=genproto/oteldemo --go_opt=paths=source_relative --go_opt=Mdemo.proto=. \
            --go-grpc_out=genproto/oteldemo --go-grpc_opt=paths=source_relative --go-grpc_opt=Mdemo.proto=. \
            ../../proto/demo.proto

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race ./...

      - name: Docker build
        run: docker build -t product-catalog:ci .

  cart:
    name: Cart (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cart
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v3

      - name: Build & Test
        run: gradle build --no-daemon

      - name: Docker build
        run: docker build -t cart:ci .

  payment:
    name: Payment (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/payment
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/payment

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Docker build
        run: docker build -t payment:ci .

  checkout:
    name: Checkout (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/checkout
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Generate protobuf
        run: |
          python -m grpc_tools.protoc -I../../proto \
            --python_out=. --grpc_python_out=. \
            ../../proto/demo.proto

      - name: Test
        run: pytest -v test_checkout.py

      - name: Docker build
        run: docker build -t checkout:ci .

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Docker build
        run: docker build -t frontend:ci .
