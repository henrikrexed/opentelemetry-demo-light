apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator-dynatrace
spec:
  replicas: 0
  selector:
    matchLabels:
      app: load-generator-dynatrace
  template:
    metadata:
      labels:
        app: load-generator-dynatrace
    spec:
      containers:
        - name: load-generator
          image: ghcr.io/henrikrexed/opentelemetry-demo-light/load-generator-dynatrace:latest
          env:
            - name: FRONTEND_URL
              value: http://frontend:8080
            - name: K6_VUS
              value: "5"
            - name: K6_DURATION
              value: "0"
            - name: K6_OUTPUT_MODE
              value: output-dynatrace
            - name: K6_DYNATRACE_URL
              valueFrom:
                secretKeyRef:
                  name: dynatrace-credentials
                  key: url
            - name: K6_DYNATRACE_APITOKEN
              valueFrom:
                secretKeyRef:
                  name: dynatrace-credentials
                  key: apitoken
            - name: OTEL_SERVICE_NAME
              value: load-generator
          resources:
            limits:
              memory: 128Mi
            requests:
              memory: 64Mi
